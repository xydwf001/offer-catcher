<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Offer 捕手是一个学生求职匹配智能体 Demo，帮助学生匹配岗位并优化简历初筛命中率。"
    />
    <title>Offer 捕手 - 学生求职匹配智能体</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#top" aria-label="Offer 捕手首页">
        <span class="brand-mark" aria-hidden="true">O</span>
        <span>
          <strong>Offer 捕手</strong>
          <small>学生求职匹配智能体</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="主要区域">
        <a href="#matches">岗位匹配</a>
        <a href="#resume">简历诊断</a>
        <a href="#strategy">投递策略</a>
        <a href="docs/offer-catcher-solution.pdf">方案 PDF</a>
      </nav>
    </header>

    <main id="top" class="workspace">
      <section class="input-panel" aria-labelledby="profile-title">
        <div class="panel-heading">
          <p class="section-label">输入画像</p>
          <h1 id="profile-title">把简历和目标岗位放到同一张桌面上。</h1>
          <p>
            输入你的背景、偏好和简历文本，智能体会给出岗位优先级、初筛命中率和可执行的简历修改建议。
          </p>
        </div>

        <form id="profile-form" class="profile-form">
          <label for="profile">学生背景</label>
          <textarea id="profile" name="profile" rows="5"></textarea>

          <div class="form-grid">
            <label>
              目标方向
              <select id="role" name="role">
                <option value="data">数据分析</option>
                <option value="ai-product">AI 产品经理</option>
                <option value="frontend">前端开发</option>
                <option value="growth">用户增长运营</option>
              </select>
            </label>

            <label>
              城市偏好
              <select id="city" name="city">
                <option value="上海">上海</option>
                <option value="深圳">深圳</option>
                <option value="北京">北京</option>
                <option value="杭州">杭州</option>
                <option value="不限">不限</option>
              </select>
            </label>
          </div>

          <label for="keywords">能力关键词</label>
          <input id="keywords" name="keywords" type="text" />

          <label for="resume">简历文本</label>
          <textarea id="resume" name="resume" rows="9"></textarea>

          <div class="form-actions">
            <button class="primary-button" type="submit">开始匹配</button>
            <button class="ghost-button" id="load-sample" type="button">载入示例</button>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="summary-strip">
          <div>
            <span class="metric-label">最推荐岗位</span>
            <strong id="top-role">等待分析</strong>
          </div>
          <div>
            <span class="metric-label">匹配分</span>
            <strong id="top-score">--</strong>
          </div>
          <div>
            <span class="metric-label">初筛命中率</span>
            <strong id="screen-score">--</strong>
          </div>
        </div>

        <section id="matches" class="module" aria-labelledby="matches-title">
          <div class="module-heading">
            <div>
              <p class="section-label">岗位匹配</p>
              <h2 id="matches-title">推荐清单</h2>
            </div>
            <span id="analysis-status" class="status-pill">已载入示例</span>
          </div>
          <div id="job-list" class="job-list"></div>
        </section>

        <section id="resume" class="module split-module" aria-labelledby="resume-title">
          <div>
            <p class="section-label">简历诊断</p>
            <h2 id="resume-title">初筛命中率拆解</h2>
            <div id="score-breakdown" class="breakdown"></div>
          </div>
          <div class="action-box">
            <h3>下一版简历优先改这里</h3>
            <ul id="resume-actions"></ul>
            <button id="copy-actions" class="secondary-button" type="button">复制优化建议</button>
          </div>
        </section>

        <section id="strategy" class="module" aria-labelledby="strategy-title">
          <div class="module-heading">
            <div>
              <p class="section-label">投递策略</p>
              <h2 id="strategy-title">智能体行动记录</h2>
            </div>
          </div>
          <ol id="agent-log" class="agent-log"></ol>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
